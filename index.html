<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HealthOS</title>

<style>
:root {
  --bg:#0d0118;
  --card: rgba(255,255,255,0.05);
  --accent:#4ade80;
}

body {
  margin:0;
  font-family:-apple-system, system-ui;
  background:var(--bg);
  color:white;
}

.container {
  padding:20px;
  max-width:500px;
  margin:auto;
}

.tabs {
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-bottom:20px;
}

.tab {
  padding:10px 16px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  font-size:12px;
  opacity:.4;
}

.tab.active {
  opacity:1;
  background:var(--accent);
  color:black;
  box-shadow:0 0 15px var(--accent);
}

.card {
  background:var(--card);
  padding:16px;
  border-radius:24px;
  margin-bottom:12px;
  border-left:4px solid var(--accent);
  transition:.2s;
}

.card.done {
  opacity:.4;
  text-decoration:line-through;
}

.card.done::after {
  content:"✓";
  float:right;
  color:var(--accent);
}

button {
  padding:10px 14px;
  border-radius:14px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}
</style>
</head>

<body>
<div class="container">

<div class="tabs" id="tabs"></div>

<div id="list"></div>

<button onclick="resetDay()">Reset Day</button>

</div>

<script>
const data = {
  1:{color:"#4ade80", items:["NMN","CaAKG","NAC"]},
  2:{color:"#38bdf8", items:["Vitamin D3","Omega 3"]},
  3:{color:"#818cf8", items:["Magnesium","Uridin","CoQ10"]},
};

let current = 1;

function renderTabs(){
  const t = document.getElementById("tabs");
  t.innerHTML="";
  Object.keys(data).forEach(k=>{
    const el=document.createElement("div");
    el.className="tab"+(k==current?" active":"");
    el.innerText="P"+k;
    el.onclick=()=>{current=k; render();}
    t.appendChild(el);
  });
}

function renderList(){
  const l=document.getElementById("list");
  l.innerHTML="";
  data[current].items.forEach((name,i)=>{
    const key=current+"_"+i;
    const done=localStorage.getItem(key);

    const c=document.createElement("div");
    c.className="card"+(done?" done":"");
    c.innerText=name;

    c.onclick=()=>{
      if(done){localStorage.removeItem(key);}
      else{localStorage.setItem(key,true);}
      renderList();
    };

    l.appendChild(c);
  });

  document.documentElement.style.setProperty("--accent", data[current].color);
}

function render(){
  renderTabs();
  renderList();
}

function resetDay(){
  localStorage.clear();
  render();
}

render();
</script>
</body>
</html>
